name: Docs Mermaid Validate

on:
  pull_request:
    paths:
      - "**/*.md"
      - "scripts/validate-mermaid.py"
      - ".github/workflows/docs-mermaid-validate.yml"

jobs:
  validate-mermaid:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate Mermaid blocks in changed Markdown
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=1
          mapfile -t changed_md < <(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- '*.md')

          if [ "${#changed_md[@]}" -eq 0 ]; then
            echo "No Markdown changes detected in PR diff."
            exit 0
          fi

          printf 'Changed Markdown files:\n%s\n' "${changed_md[*]}"
          python3 scripts/validate-mermaid.py "${changed_md[@]}"
